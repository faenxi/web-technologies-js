<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Завдання 2 - Світлофор</title>
  <style>
    body { font-family: Arial, sans-serif; text-align: center; padding: 30px; background: #bfdfff; color: white; }
    .traffic-light { display: inline-block; background: #333; border-radius: 20px; padding: 20px; border: 4px solid #555; }
    .light { width: 80px; height: 80px; border-radius: 50%; margin: 10px auto; background: #444; transition: 0.3s; }
    .red.active { background: #ff4d4d; box-shadow: 0 0 25px #ff4d4d; }
    .yellow.active { background: #ffeb3b; box-shadow: 0 0 25px #ffeb3b; }
    .green.active { background: #4caf50; box-shadow: 0 0 25px #4caf50; }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
    .blinking { animation: blink 0.5s infinite; }
    #state-desc { font-size: 24px; margin: 20px; font-weight: bold; height: 30px; }
    .config-panel { margin-top: 30px; background: rgba(255,255,255,0.1); padding: 20px; border-radius: 10px; display: inline-block; }
    input { width: 50px; padding: 5px; margin: 5px; border-radius: 4px; border: none; }
    button { padding: 10px 20px; cursor: pointer; border-radius: 5px; border: none; background: #3498db; color: white; margin: 5px; }
    button:hover { background: #2980b9; }
  </style>
</head>
<body>
  <h1>Traffic light</h1>
  <div class="traffic-light">
    <div class="light red" id="light-red"></div>
    <div class="light yellow" id="light-yellow"></div>
    <div class="light green" id="light-green"></div>
  </div>
  <div id="state-desc">Натисніть "Старт"</div>
  <div class="main-controls">
    <button onclick="startTrafficCycle()">Cтарт</button>
    <button onclick="stopTrafficCycle()">Стоп</button>
    <button onclick="stepNext()">Наступний</button>
  </div>
  <div class="config-panel">
    <h3>Налаштування (сек):</h3>
    Червоний: <input type="number" id="input-red" value="5">
    Жовтий: <input type="number" id="input-yellow" value="2">
    Зелений: <input type="number" id="input-green" value="6">
    <br>
    <button onclick="updateTimings()" style="background: #27ae60;">Оновити час</button>
  </div>
  <script src="traffic.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Завдання 4 - Оновлений Магазин</title>
  <style>
    body { font-family: 'Segoe UI', sans-serif; padding: 20px; background: #f0f2f5; max-width: 900px; margin: 0 auto; }
    .card { background: white; border-radius: 12px; padding: 20px; margin: 15px 0; box-shadow: 0 4px 10px rgba(0,0,0,0.08); }
    h2 { color: #333; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-top: 0; }
    
    .form-group { margin: 10px 0; display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
    input, select { padding: 10px; border: 1px solid #ddd; border-radius: 6px; flex: 1; min-width: 150px; }
    
    button { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; transition: 0.3s; }
    .btn-add { background: #2ecc71; color: white; }
    .btn-order { background: #e67e22; color: white; width: 100%; margin-top: 10px; }
    .btn-action { background: #3498db; color: white; }
    
    table { width: 100%; border-collapse: collapse; margin-top: 15px; }
    th { background: #f8f9fa; text-align: left; padding: 12px; border-bottom: 2px solid #dee2e6; }
    td { padding: 12px; border-bottom: 1px solid #eee; }

    #order-summary { background: #fff3e0; padding: 15px; border-radius: 8px; margin-top: 10px; display: none; border-left: 5px solid #ff9800; }
    .badge { padding: 4px 8px; border-radius: 4px; font-size: 12px; background: #e8f5e9; color: #2e7d32; }
  </style>
</head>
<body>

  <h1>Store</h1>

  <div class="card">
    <h2>Налаштування категорій</h2>
    <div class="form-group">
      <input type="text" id="new-cat-name" placeholder="Назва нової категорії">
      <button class="btn-action" onclick="addNewCategory()">Створити категорію</button>
    </div>
    <div id="categories-display"></div>
  </div>

  <div class="card">
    <h2>Додати товар</h2>
    <div class="form-group">
      <input type="text" id="prod-name" placeholder="Назва товару">
      <input type="number" id="prod-price" placeholder="Ціна">
      <input type="number" id="prod-qty" placeholder="Кількість">
      <select id="prod-category">
        <option value="">-- Оберіть категорію --</option>
      </select>
      <button class="btn-add" onclick="addProduct()">Додати в каталог</button>
    </div>
  </div>

  <div class="card">
    <h2>Швидке замовлення</h2>
    <div class="form-group">
      <select id="order-select" onchange="updateOrderPreview()">
        <option value="">-- Оберіть товар для замовлення --</option>
      </select>
      <input type="number" id="order-qty" value="1" min="1" oninput="updateOrderPreview()">
    </div>
    <div id="order-summary">
      <strong>Попередній чек:</strong> <span id="summary-text"></span>
      <button class="btn-order" onclick="confirmOrder()">Підтвердити замовлення</button>
    </div>
  </div>

  <div class="card">
    <h2>Актуальний склад</h2>
    <div id="catalog-table-root"></div>
  </div>

  <script src="store.js"></script>
</body>
</html>
